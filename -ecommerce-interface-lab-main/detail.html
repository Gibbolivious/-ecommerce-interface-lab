<!doctype html>
<html lang="en">
  <head>
    <meta name="viewport"
    content="width=device-width"
    initial-scale="1" charset="UTF-8" />
    <title>detail</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main>
      <article>
        <h1>Product Name</h1>
        <img src="product.jpg" alt="Product Name" />
        <p class="price">49.99</p>

        <section aria-labelledby="specs-heading">
          <h2 id="specs-heading">Technical Specifications</h2>
          <table>
            <caption>
              Product Details
            </caption>
            <tr>
              <th scope="row">Weight</th>
              <td>1kg</td>
            </tr>
            <tr>
              <th scope="row">Color</th>
              <td>Black</td>
            </tr>
          </table>
        </section>

        <section aria-labelledby="purchase-heading">
          <h2 id="purchase-heading">Purchase</h2>
          <form>
            <label for="quantity">Quantity:</label>
            <input
              type="number"
              id="quantity"
              name="quantity"
              min="1"
              value="1"
            />
            <button type="submit">Add to Cart</button>
          </form>
        </section>

        <section aria-labelledby="reviews-heading">
          <h2 id="reviews-heading">User Reviews</h2>

          <article>
            <h3>Gabriel C.</h3>
            <blockquote>Great product! Highly recommend.</blockquote>
          </article>
        </section>
      </article>
    </main>
  </body>
</html>
